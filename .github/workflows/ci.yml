name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  PIXI_VERSION: v0.63.2
  CCACHE_MAX_SIZE: 2G

# Cancel in-progress runs when a new run is triggered for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================================================
  # Job 1: Format Check (fast feedback)
  # ========================================================================
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pixi.toml
          environments: lint
          locked: true

      - name: Run clang-format
        run: git ls-files -z '*.c' '*.h' '*.cpp' '*.hpp' | xargs -0 pixi run -e lint clang-format -i

      - name: Run taplo (TOML format)
        run: git ls-files -z '*.toml' | grep -zv 'test_data/' | xargs -0 pixi run -e lint taplo fmt

      - name: Check for formatting changes
        run: |
          if git diff --quiet; then
            echo "✅ Code is properly formatted"
          else
            echo "❌ Code needs formatting. Run 'pixi run format' locally."
            git diff --stat
            exit 1
          fi

  # ========================================================================
  # Job 2: Build and Test (ASAN only - fast with ccache)
  # ========================================================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pixi.toml
          locked: true

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-main-
            ${{ runner.os }}-ccache-
          max-size: ${{ env.CCACHE_MAX_SIZE }}

      - name: Configure ccache
        run: |
          pixi run ccache --set-config=max_size=${{ env.CCACHE_MAX_SIZE }}
          pixi run ccache --set-config=compression=true
          pixi run ccache --zero-stats

      # Build with asan preset (no clang-tidy for speed)
      - name: Build (ASAN preset)
        run: pixi run build -p asan

      - name: Run Tests
        run: pixi run test -p asan

      - name: Show ccache statistics
        if: always()
        run: pixi run ccache --show-stats

  # ========================================================================
  # Job 3: Static Analysis (clang-tidy - slower but separate)
  # ========================================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          manifest-path: pixi.toml
          locked: true

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-tidy-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-tidy-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-tidy-main-
            ${{ runner.os }}-ccache-tidy-
            ${{ runner.os }}-ccache-main-
            ${{ runner.os }}-ccache-
          max-size: ${{ env.CCACHE_MAX_SIZE }}

      - name: Configure ccache
        run: |
          pixi run ccache --set-config=max_size=${{ env.CCACHE_MAX_SIZE }}
          pixi run ccache --set-config=compression=true
          pixi run ccache --zero-stats

      # Build with quality preset (includes clang-tidy)
      - name: Build with clang-tidy
        run: pixi run build -p quality

      - name: Show ccache statistics
        if: always()
        run: pixi run ccache --show-stats

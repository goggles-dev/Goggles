[workspace]
channels = ["conda-forge"]
name = "Goggles"
platforms = ["linux-64"]
version = "0.1.0"
requires-pixi = ">=0.45.0"
preview = ["pixi-build"]

[activation.env]
CC = "$CONDA_PREFIX/bin/clang-21"
CXX = "$CONDA_PREFIX/bin/clang++-21"
GCC = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-gcc"
GXX = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-g++"
CCACHE_TEMPDIR = "$PIXI_PROJECT_ROOT/.cache/ccache-tmp"
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib"
PKG_CONFIG_PATH = "$CONDA_PREFIX/lib/pkgconfig:$CONDA_PREFIX/share/pkgconfig"
VULKAN_SDK = "$CONDA_PREFIX"
VK_ADD_LAYER_PATH = "$CONDA_PREFIX/share/vulkan/explicit_layer.d"

[tasks]
# Run `pixi task list` or `pixi run help` to see available tasks.
# All tasks that accept a preset use: -p, --preset PRESET (default: debug)

[tasks._check-init]
cmd = "bash scripts/ensure-init.sh"

[tasks.build]
description = "Build app"
cmd = "bash scripts/task/build.sh"
depends-on = ["_check-init"]

[tasks.build-all-presets]
description = "Build all CMake presets"
cmd = "bash scripts/task/build-all-presets.sh"
depends-on = ["_check-init"]

[tasks.test]
description = "Run tests"
cmd = "bash scripts/task/test.sh"

[tasks.ci]
description = "Run local CI lanes (format, build-test, static-analysis, static-analysis-semgrep, static-analysis-quality, static-analysis-quality-pr)"
cmd = "bash scripts/task/ci.sh"

[tasks.ci-static-analysis]
description = "Run both static-analysis lanes (Semgrep + quality build)"
cmd = "bash scripts/task/ci.sh --lane static-analysis"

[tasks.ci-static-analysis-semgrep]
description = "Run the Semgrep static-analysis lane"
cmd = "bash scripts/task/ci.sh --lane static-analysis-semgrep"

[tasks.ci-static-analysis-quality]
description = "Run the quality-build static-analysis lane"
cmd = "bash scripts/task/ci.sh --lane static-analysis-quality"

[tasks.start]
description = "Launch app inside compositor + viewer"
cmd = "bash scripts/task/start.sh"

[tasks.profile]
description = "Capture a Goggles Tracy profile session"
cmd = "bash scripts/task/profile.sh"

[tasks.shader-fetch]
description = "Download RetroArch slang shaders"
cmd = "bash scripts/task/shader-fetch.sh"

[tasks.appimage-stage]
description = "Stage AppDir for AppImage"
cmd = "bash scripts/task/appimage_stage.sh"

[tasks.appimage-build]
description = "Build AppImage from staged AppDir"
cmd = "bash scripts/task/appimage_build.sh"

[tasks.appimage]
description = "Build Goggles AppImage bundle"
cmd = "bash scripts/task/appimage.sh"

[tasks.init]
description = "Install or repair managed pre-commit hook"
cmd = "bash scripts/task/init.sh"

[tasks.clean]
description = "Remove build directories"
cmd = "bash scripts/task/clean.sh"

[tasks.distclean]
description = "Remove all build directories"
cmd = "rm -rf build"

[tasks.format]
description = "Format C/C++ and TOML files"
cmd = "bash -c \"echo 'Formatting C/C++...' && git ls-files -z '*.c' '*.h' '*.cpp' '*.hpp' | xargs -0 clang-format -i && echo 'Formatting TOML...' && git ls-files -z '*.toml' | grep -zv 'test_data/' | xargs -0 taplo fmt && echo 'Done!'\""

[tasks.semgrep]
description = "Run Semgrep rules and fixture verification"
cmd = "bash -c 'semgrep scan --error --metrics=off --config .semgrep.yml --config .semgrep/rules src tests && python tests/semgrep/verify_semgrep_fixtures.py'"

[tasks.help]
description = "Show task usage"
cmd = "bash scripts/task/help.sh"

[tasks.update-golden]
description = "Regenerate golden reference images for shader visual tests"
cmd = "bash scripts/task/update-golden.sh"
depends-on = ["build"]

[dependencies]
cmake = "3.31.*"
ninja = "1.12.*"
clang_linux-64 = "21.*"
clangxx_linux-64 = "21.*"
gcc_linux-64 = "*"
gxx_linux-64 = "*"
sysroot_linux-64 = "2.28.*"
pkg-config = ">=0.29.2,<0.30"
clang-tools = "==21.1.6"
spdlog = "1.15.*"
catch2 = "3.8.*"
toml11 = "4.4.*"
libvulkan-headers = "1.4.328.*"
vulkan-validation-layers = "1.4.328.*"
vulkan-tools = "1.4.328.*"
libxcb = "*"
xorg-libx11 = "*"
xorg-xproto = "*"
wayland = "*"
wayland-protocols = "*"
libxkbcommon = "*"
alsa-lib = "*"
jack = "*"
xorg-libxext = "*"
xorg-libxcursor = "*"
xorg-libxrandr = "*"
xorg-libxi = "*"
xorg-libxscrnsaver = "*"
xorg-libxinerama = "*"
xorg-libxfixes = "*"
xorg-libxrender = "*"
xorg-libxau = "*"
xorg-libxdmcp = "*"
xorg-xextproto = "*"
xorg-renderproto = "*"
xorg-randrproto = "*"
xorg-inputproto = "*"
xorg-fixesproto = "*"
xorg-scrnsaverproto = "*"
xorg-xineramaproto = "*"
pulseaudio = "*"
xorg-kbproto = "*"
xorg-glproto = "*"
libdrm = "*"
cli11 = "2.6.*"
ccache = "4.*"
lld = "21.*"
patchelf = "*"
taplo = "==0.9.3"
sdl3 = "3.2.*"
xorg-libxtst = "*"
pixman = "*"
xcb-util-wm = "*"
xcb-util-renderutil = "*"

# Local packages
tracy = { path = "packages/tracy" }
expected-lite = { path = "packages/expected-lite" }
stb = { path = "packages/stb" }
bs-thread-pool = { path = "packages/bs-thread-pool" }
slang-shaders = { path = "packages/slang-shaders" }
wlroots-0-19 = { path = "packages/wlroots_0_19" }
imgui = { path = "packages/imgui" }
python = "3.12.*"

# CI-only: Lightweight lint environment
[feature.lint.dependencies]
clang-tools = "21.*"
taplo = "==0.9.3"

[feature.lint.tasks.ci-format]
description = "Run the local CI format-check lane"
cmd = "bash scripts/task/ci.sh --lane format"

[environments]
default = { solve-group = "default" }
lint = { features = ["lint"], no-default-feature = true, solve-group = "lint" }

[pypi-dependencies]
semgrep = "==1.154.0"

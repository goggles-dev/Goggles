[workspace]
channels = ["conda-forge"]
name = "Goggles"
platforms = ["linux-64"]
version = "0.1.0"
requires-pixi = ">=0.45.0"
preview = ["pixi-build"]

[activation.env]
CC = "$CONDA_PREFIX/bin/clang-21"
CXX = "$CONDA_PREFIX/bin/clang++-21"
GCC = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-gcc"
GXX = "$CONDA_PREFIX/bin/x86_64-conda-linux-gnu-g++"
CCACHE_TEMPDIR = "$PIXI_PROJECT_ROOT/.cache/ccache-tmp"
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib"
PKG_CONFIG_PATH = "$CONDA_PREFIX/lib/pkgconfig:$CONDA_PREFIX/share/pkgconfig"
VULKAN_SDK = "$CONDA_PREFIX"
VK_ADD_LAYER_PATH = "$CONDA_PREFIX/share/vulkan/explicit_layer.d"

[tasks]
# Run `pixi task list` or `pixi run help` to see available tasks.
# All tasks that accept a preset use: -p, --preset PRESET (default: debug)

[tasks._check-init]
cmd = "bash scripts/ensure-init.sh"

[tasks.build]
description = "Build 64-bit app + layer"
cmd = "bash scripts/task/build.sh"
depends-on = ["_check-init"]

[tasks.build-i686]
description = "Build 32-bit layer only"
cmd = "bash scripts/task/build-i686.sh"

[tasks.build-all-presets]
description = "Build all CMake presets (including i686)"
cmd = "bash scripts/task/build-all-presets.sh"
depends-on = ["_check-init"]

[tasks.install-manifests]
description = "Install Vulkan layer manifests"
cmd = "bash scripts/task/install-manifests.sh"

[tasks.test]
description = "Run tests"
cmd = "bash scripts/task/test.sh"

[tasks.dev]
description = "Build full dev environment"
cmd = "bash scripts/task/dev.sh"

[tasks.start]
description = "Launch app with capture + viewer"
cmd = "bash scripts/task/start.sh"

[tasks.profile]
description = "Run dual-process Tracy profile session"
cmd = "bash scripts/task/profile.sh"

[tasks.shader-fetch]
description = "Download RetroArch slang shaders"
cmd = "bash scripts/task/shader-fetch.sh"

[tasks.appimage-stage]
description = "Stage AppDir for AppImage"
cmd = "bash scripts/task/appimage_stage.sh"

[tasks.appimage-build]
description = "Build AppImage from staged AppDir"
cmd = "bash scripts/task/appimage_build.sh"

[tasks.appimage]
description = "Build Goggles AppImage (viewer + multiarch layer)"
cmd = "bash scripts/task/appimage.sh"

[tasks.vulkan-layer-check]
description = "Check Vulkan loader discovers Goggles layer (64-bit)"
cmd = "bash scripts/task/vulkan_layer_check.sh"

[tasks.init]
description = "First-time project setup"
cmd = "bash scripts/task/init.sh"

[tasks.clean]
description = "Remove build directories"
cmd = "bash scripts/task/clean.sh"

[tasks.distclean]
description = "Remove all build directories"
cmd = "rm -rf build"

[tasks.format]
description = "Format C/C++ and TOML files"
cmd = "bash -c \"echo 'Formatting C/C++...' && git ls-files -z '*.c' '*.h' '*.cpp' '*.hpp' | xargs -0 clang-format -i && echo 'Formatting TOML...' && git ls-files -z '*.toml' | grep -zv 'test_data/' | xargs -0 taplo fmt && echo 'Done!'\""

[tasks.help]
description = "Show task usage"
cmd = "bash scripts/task/help.sh"

[dependencies]
cmake = "3.31.*"
ninja = "1.12.*"
clang_linux-64 = "21.*"
clangxx_linux-64 = "21.*"
gcc_linux-64 = "*"
gxx_linux-64 = "*"
sysroot_linux-64 = "2.28.*"
pkg-config = ">=0.29.2,<0.30"
clang-tools = "==21.1.6"
spdlog = "1.15.*"
catch2 = "3.8.*"
toml11 = "4.4.*"
libvulkan-headers = "1.4.328.*"
vulkan-validation-layers = "1.4.328.*"
libxcb = "*"
xorg-libx11 = "*"
xorg-xproto = "*"
wayland = "*"
wayland-protocols = "*"
libxkbcommon = "*"
alsa-lib = "*"
jack = "*"
xorg-libxext = "*"
xorg-libxcursor = "*"
xorg-libxrandr = "*"
xorg-libxi = "*"
xorg-libxscrnsaver = "*"
xorg-libxinerama = "*"
xorg-libxfixes = "*"
xorg-libxrender = "*"
xorg-libxau = "*"
xorg-libxdmcp = "*"
xorg-xextproto = "*"
xorg-renderproto = "*"
xorg-randrproto = "*"
xorg-inputproto = "*"
xorg-fixesproto = "*"
xorg-scrnsaverproto = "*"
xorg-xineramaproto = "*"
pulseaudio = "*"
xorg-kbproto = "*"
xorg-glproto = "*"
libdrm = "*"
cli11 = "2.6.*"
ccache = "4.*"
lld = "21.*"
patchelf = "*"
taplo = "==0.9.3"
sdl3 = "3.2.*"
xorg-libxtst = "*"
pixman = "*"
xcb-util-wm = "*"
xcb-util-renderutil = "*"

# Local packages
tracy = { path = "packages/tracy" }
sysroot-i686 = { path = "packages/sysroot-i686" }
expected-lite = { path = "packages/expected-lite" }
stb = { path = "packages/stb" }
bs-thread-pool = { path = "packages/bs-thread-pool" }
slang-shaders = { path = "packages/slang-shaders" }
wlroots-0-19 = { path = "packages/wlroots_0_19" }
imgui = { path = "packages/imgui" }

# CI-only: Lightweight lint environment
[feature.lint.dependencies]
clang-tools = "21.*"
taplo = "==0.9.3"

[environments]
default = { solve-group = "default" }
lint = { features = ["lint"], no-default-feature = true, solve-group = "lint" }
